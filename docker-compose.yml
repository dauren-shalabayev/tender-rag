services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5437:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 3s
      timeout: 5s
      retries: 15

  api:
    build: .
    ports:
      - "8083:8083"
    # OPENAI_API_KEY и прочие секреты — в файле .env рядом с compose (см. .env.example), не коммитьте .env
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
      EMBEDDING_MODEL: intfloat/multilingual-e5-small
      FILES_DIR: /files
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      COMPANY_PROFILE: ${COMPANY_PROFILE:-}
      COMPANY_PROFILE_FILE: ${COMPANY_PROFILE_FILE:-/files/company_profile.txt}
    volumes:
      - ./files:/files:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
