services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5437:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 3s
      timeout: 5s
      retries: 15

  api:
    build: .
    ports:
      - "8083:8083"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
      EMBEDDING_MODEL: intfloat/multilingual-e5-small
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
